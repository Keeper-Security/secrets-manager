# vim: set shiftwidth=2 tabstop=2 softtabstop=-1 expandtab:
---
- name: Keeper Create Subfolder
  hosts: "my_systems"
  gather_facts: no

  tasks:
  - name: "Create Record in Subfolder"
    keeper_create:
      shared_folder_uid: "{{ shared_folder_uid }}"
      folder_uid: "{{ folder_uid | default(omit) }}"
      record_type: login
      generate_password: True
      title: "My Subfolder Record"
      fields:
        - type: login
          value: "johndoe@localhost"
    register: "new_record"

  - name: "Print Record UID"
    debug:
      var: new_record.record_uid
      verbosity: 0
