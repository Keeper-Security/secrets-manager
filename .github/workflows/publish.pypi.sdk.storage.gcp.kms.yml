name: Publish to PyPI (Python SDK Storage GCP KMS)
on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI (uncheck to build and scan SBOM only)'
        required: false
        default: 'true'
        type: boolean
      repository-url:
        description: 'PyPI upload URL — set to https://test.pypi.org/legacy/ to validate trusted publishing without a real release'
        required: false
        default: 'https://upload.pypi.org/legacy/'
        type: string

permissions:
  contents: read

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version
        id: extract-version
        working-directory: ./sdk/python/storage/keeper_secrets_manager_storage_gcp_kms
        run: |
          VERSION=$(grep -Po 'version\s*=\s*["\x27]\K[^\x27"]*' pyproject.toml | head -1)
          echo "Version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  validate-versions:
    name: Validate version not yet published
    needs: get-versions
    runs-on: ubuntu-latest
    steps:
      - name: Check version not on target registry
        env:
          REPO_URL: ${{ inputs.repository-url }}
          VERSION: ${{ needs.get-versions.outputs.version }}
        run: |
          if echo "$REPO_URL" | grep -q "test.pypi.org"; then
            CHECK_URL="https://test.pypi.org/pypi/keeper-secrets-manager-storage-gcp-kms/${VERSION}/json"
            REGISTRY="TestPyPI"
          else
            CHECK_URL="https://pypi.org/pypi/keeper-secrets-manager-storage-gcp-kms/${VERSION}/json"
            REGISTRY="PyPI"
          fi
          echo "Checking $REGISTRY for keeper-secrets-manager-storage-gcp-kms $VERSION..."
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$CHECK_URL")
          if [ "$STATUS" = "200" ]; then
            echo "::error::keeper-secrets-manager-storage-gcp-kms ${VERSION} is already on $REGISTRY. Aborting."
            exit 1
          fi
          echo "keeper-secrets-manager-storage-gcp-kms $VERSION not yet on $REGISTRY - ok to proceed"

  generate-sbom:
    name: Generate and publish SBOM
    needs: [get-versions, validate-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install package from source into scan target
        run: |
          mkdir -p /tmp/scan-target
          pip3 install --quiet --target /tmp/scan-target ./sdk/python/storage/keeper_secrets_manager_storage_gcp_kms

      - name: Install Syft and Manifest CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.32.0
          curl -sSfL https://raw.githubusercontent.com/manifest-cyber/cli/main/install.sh | sh -s -- -b /usr/local/bin v0.31.0

      - name: Generate and publish SBOM
        env:
          MANIFEST_TOKEN: ${{ secrets.MANIFEST_TOKEN }}
          VERSION: ${{ needs.get-versions.outputs.version }}
        run: |
          SCAN_TARGET=/tmp/scan-target

          echo "Scanning: $SCAN_TARGET"
          echo "Packages installed:"
          pip3 list --path "$SCAN_TARGET"

          manifest sbom "$SCAN_TARGET" \
            --generator=syft \
            --name=keeper-secrets-manager-storage-gcp-kms \
            --version="${VERSION}" \
            --output=spdx-json \
            --file=sbom.json \
            --api-key="${MANIFEST_TOKEN}" \
            --publish=true \
            --asset-label=ksm,storage,gcp,python,security 2>&1 || \
          manifest sbom "$SCAN_TARGET" \
            --generator=syft \
            --name=keeper-secrets-manager-storage-gcp-kms \
            --version="${VERSION}" \
            --output=spdx-json \
            --file=sbom.json \
            --api-key="${MANIFEST_TOKEN}" \
            --publish=true \
            --label=ksm,storage,gcp,python,security

      - name: Archive SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ needs.get-versions.outputs.version }}
          path: sbom.json
          retention-days: 10

  publish:
    name: Publish to PyPI
    needs: [generate-sbom, get-versions]
    if: ${{ github.event.inputs.publish == 'true' }}
    environment: prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python 3.9
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.9'

      - name: Install build tools
        run: |
          python3 -m pip install --upgrade pip setuptools
          python3 -m pip install build 'wheel>=0.46.3'  # wheel pin: CVE-2026-24049

      - name: Build
        working-directory: ./sdk/python/storage/keeper_secrets_manager_storage_gcp_kms
        run: python3 -m build --no-isolation

      - name: Verify import
        working-directory: ./sdk/python/storage/keeper_secrets_manager_storage_gcp_kms
        run: |
          python3 -m pip install dist/*.whl
          python3 -c "from keeper_secrets_manager_storage_gcp_kms import GCPKeyValueStorage; print('import OK')"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: sdk/python/storage/keeper_secrets_manager_storage_gcp_kms/dist/
          repository-url: ${{ inputs.repository-url }}
