name: Publish to RubyGems (Ruby SDK)
on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to RubyGems (uncheck to build and scan SBOM only)'
        required: false
        default: 'true'
        type: boolean

jobs:
  test-ruby-sdk:
    name: Test Ruby SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ./sdk/ruby

    steps:
      - name: Get the source code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: ./sdk/ruby

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install

      - name: Run unit tests
        run: |
          bundle exec rspec spec/

  generate-sbom:
    name: Generate SBOM
    needs: test-ruby-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get the source code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: ./sdk/ruby

      - name: Detect Ruby SDK version
        id: detect-version
        working-directory: ./sdk/ruby
        run: |
          VERSION=$(ruby -r ./lib/keeper_secrets_manager/version.rb -e "puts KeeperSecretsManager::VERSION")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build gem and install runtime deps to scan target
        working-directory: ./sdk/ruby
        run: |
          gem build keeper_secrets_manager.gemspec
          gem install --install-dir /tmp/ruby-scan-target --no-document keeper_secrets_manager-*.gem

      - name: Install Syft and Manifest CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.32.0
          curl -sSfL https://raw.githubusercontent.com/manifest-cyber/cli/main/install.sh | sh -s -- -b /usr/local/bin v0.30.0

      - name: Generate and publish SBOM
        env:
          MANIFEST_TOKEN: ${{ secrets.MANIFEST_TOKEN }}
          PROJECT_VERSION: ${{ steps.detect-version.outputs.version }}
        run: |
          # Scan only the installed gemspec rather than the full install dir.
          # Ruby 4.0 extracts stdlib gems (racc, bigdecimal, reline) into any
          # --install-dir target even when the gem has zero runtime deps; scanning
          # the whole dir picks them up as false-positive license findings.
          manifest sbom /tmp/ruby-scan-target/specifications/keeper_secrets_manager-${PROJECT_VERSION}.gemspec \
            --generator=syft \
            --name=keeper-secrets-manager-ruby-sdk \
            --version="${PROJECT_VERSION}" \
            --output=spdx-json \
            --file=ruby-sdk-sbom.json \
            --api-key="${MANIFEST_TOKEN}" \
            --publish=true \
            --asset-label=application,sbom-generated,ruby-gem,secrets-manager

      - name: Archive SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-ruby-sdk-${{ steps.detect-version.outputs.version }}
          path: ruby-sdk-sbom.json
          retention-days: 10

  publish-rubygems:
    name: Publish Ruby SDK to RubyGems
    environment: prod
    needs: [test-ruby-sdk, generate-sbom]
    if: ${{ github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write  # OIDC trusted publishing
      contents: write  # rake release pushes the version tag

    steps:
      - name: Get the source code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: ./sdk/ruby
          bundler-cache: true

      - name: Publish to RubyGems
        uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092  # v1.4.0
        with:
          working-directory: sdk/ruby
