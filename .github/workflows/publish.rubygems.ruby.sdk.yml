name: Publish to RubyGems (Ruby SDK)
on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to RubyGems (uncheck to build and scan SBOM only)'
        required: false
        default: 'true'
        type: boolean

jobs:
  test-ruby-sdk:
    name: Test Ruby SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ./sdk/ruby

    steps:
      - name: Get the source code
        uses: actions/checkout@v4

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: ./sdk/ruby

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install

      - name: Run unit tests
        run: |
          bundle exec rspec spec/

  generate-sbom:
    name: Generate SBOM
    needs: test-ruby-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./sdk/ruby

    steps:
      - name: Get the source code
        uses: actions/checkout@v4

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: ./sdk/ruby

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install

      - name: Detect Ruby SDK version
        id: detect-version
        run: |
          VERSION=$(ruby -r ./lib/keeper_secrets_manager/version.rb -e "puts KeeperSecretsManager::VERSION")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Syft and Manifest CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.32.0
          curl -sSfL https://raw.githubusercontent.com/manifest-cyber/cli/main/install.sh | sh -s -- -b /usr/local/bin v0.30.0

      - name: Generate and publish SBOM
        env:
          MANIFEST_TOKEN: ${{ secrets.MANIFEST_TOKEN }}
          PROJECT_VERSION: ${{ steps.detect-version.outputs.version }}
        run: |
          cat > syft-config.yaml << 'EOF'
          package:
            search:
              scope: all-layers
            cataloger:
              enabled: true
              java:
                enabled: false
              python:
                enabled: false
              nodejs:
                enabled: false
              ruby:
                enabled: true
                search-unindexed-archives: true
                search-indexed-archives: true
          EOF

          manifest sbom . \
            --generator=syft \
            --name=keeper-secrets-manager-ruby-sdk \
            --version="${PROJECT_VERSION}" \
            --output=spdx-json \
            --file=ruby-sdk-sbom.json \
            --api-key="${MANIFEST_TOKEN}" \
            --publish=true \
            --asset-label=application,sbom-generated,ruby-gem,secrets-manager \
            --generator-config=syft-config.yaml

      - name: Archive SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-ruby-sdk-${{ steps.detect-version.outputs.version }}
          path: ./sdk/ruby/ruby-sdk-sbom.json
          retention-days: 90

  publish-rubygems:
    name: Publish Ruby SDK to RubyGems
    environment: prod
    needs: [test-ruby-sdk, generate-sbom]
    if: ${{ github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: ./sdk/ruby

    steps:
      - name: Get the source code
        uses: actions/checkout@v4

      - name: Set up Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: ./sdk/ruby

      - name: Retrieve secrets from KSM
        id: ksmsecrets
        uses: Keeper-Security/ksm-action@37abbada28637b6478ba845e73d3f8b9676572fe
        with:
          keeper-secret-config: ${{ secrets.KSM_KSM_CONFIG }}
          secrets: |
            RQ7jXJ-r7WT2Cnq1nlFa6g/custom_field/RUBYGEMS_API_KEY > RUBYGEMS_API_KEY

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install

      - name: Build and verify gem
        run: |
          gem build keeper_secrets_manager.gemspec
          gem spec keeper_secrets_manager-*.gem

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ steps.ksmsecrets.outputs.RUBYGEMS_API_KEY }}
        run: |
          gem push keeper_secrets_manager-*.gem
