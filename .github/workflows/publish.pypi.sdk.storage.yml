name: Publish to PyPI (Python SDK Storage)
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version
        id: extract-version
        working-directory: ./sdk/python/storage/keeper_secrets_manager_storages
        run: |
          VERSION=$(python3 setup.py --version 2>/dev/null || grep -Po 'version\s*=\s*["\x27]\K[^\x27"]*' setup.py)
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  validate-versions:
    name: Validate version not yet published
    needs: get-versions
    runs-on: ubuntu-latest
    steps:
      - name: Check version not on PyPI
        run: |
          VERSION="${{ needs.get-versions.outputs.version }}"
          echo "Checking keeper-secrets-manager-storage $VERSION..."
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/keeper-secrets-manager-storage/${VERSION}/json")
          case "$STATUS" in
            200) echo "::error::keeper-secrets-manager-storage ${VERSION} is already on PyPI. Aborting."; exit 1 ;;
            404) echo "keeper-secrets-manager-storage $VERSION not yet on PyPI - ok to proceed" ;;
            *)   echo "::error::Unexpected HTTP $STATUS from PyPI version endpoint. Aborting."; exit 1 ;;
          esac

  generate-sbom:
    name: Generate and publish SBOM
    needs: [get-versions, validate-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package from source into scan target
        run: |
          mkdir -p /tmp/scan-target
          pip3 install --quiet --target /tmp/scan-target ./sdk/python/storage/keeper_secrets_manager_storages

      - name: Install Syft and Manifest CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.32.0
          curl -sSfL https://raw.githubusercontent.com/manifest-cyber/cli/main/install.sh | sh -s -- -b /usr/local/bin v0.31.0

      - name: Generate and publish SBOM
        env:
          MANIFEST_TOKEN: ${{ secrets.MANIFEST_TOKEN }}
        run: |
          SCAN_TARGET=/tmp/scan-target
          VERSION="${{ needs.get-versions.outputs.version }}"

          echo "Scanning: $SCAN_TARGET"
          echo "Packages installed:"
          pip3 list --path "$SCAN_TARGET"

          manifest sbom "$SCAN_TARGET" \
            --generator=syft \
            --name=keeper-secrets-manager-storage \
            --version="${VERSION}" \
            --output=spdx-json \
            --file=sbom.json \
            --api-key="${MANIFEST_TOKEN}" \
            --publish=true \
            --asset-label=ksm,storage,python,security

      - name: Archive SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-${{ needs.get-versions.outputs.version }}
          path: sbom.json
          retention-days: 90

  publish:
    name: Publish KSM Python SDK Storages to PyPI
    needs: [generate-sbom, get-versions]
    environment: prod
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get the source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Retrieve secrets from KSM
        id: ksmsecrets
        uses: Keeper-Security/ksm-action@37abbada28637b6478ba845e73d3f8b9676572fe # v1.3.0
        with:
          keeper-secret-config: ${{ secrets.KSM_PYPI_PUBLISHER_PYPI_SDK_CONFIG }}
          secrets: |
            -aBWi3-yU_qvatNh0Eaqew/field/password > PYPI_API_TOKEN

      - name: Install build tools
        run: |
          python3 -m pip install --upgrade pip setuptools
          python3 -m pip install build twine 'wheel>=0.46.3'  # wheel pin: CVE-2026-24049

      - name: Build and Publish
        working-directory: ./sdk/python/storage/keeper_secrets_manager_storages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ steps.ksmsecrets.outputs.PYPI_API_TOKEN }}
        run: |
          python3 -m build --no-isolation
          python3 -m pip install dist/*.whl
          python3 -c "import keeper_secrets_manager_storage, keeper_secrets_manager_hsm; print('import OK')"
          python3 -m twine upload --verbose dist/*
