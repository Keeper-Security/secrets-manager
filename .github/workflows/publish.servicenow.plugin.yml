name: Release Keeper ServiceNow Plugin

on:
  workflow_dispatch:
    inputs:
      tagname:
        type: string
        required: true
        description: "New tag name for the release (e.g. servicenow-v1.0.0)"

jobs:
  publish-servicenow-plugin:
    permissions:
      contents: write
    environment: prod
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ./integration/servicenow-external-credential-resolver

    steps:
      - name: Get the source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag format
        env:
          TAG: ${{ inputs.tagname }}
        run: |
          git check-ref-format "tags/${TAG}" || { echo "Invalid tag format: ${TAG}"; exit 1; }
          echo "Tag format is valid: ${TAG}"

      - name: Check release tag does not already exist
        env:
          TAG: ${{ inputs.tagname }}
        run: |
          git fetch --tags --quiet
          if git show-ref --tags --verify --quiet "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists"; exit 1
          fi
          echo "Tag ${TAG} is new"

      - name: Check version matches tag
        env:
          TAG: ${{ inputs.tagname }}
        run: |
          BUILD_VERSION=$(grep '^version = ' build.gradle.kts | sed -r 's/^version = "(.*)"/\1/')
          if [[ "${TAG}" != *"${BUILD_VERSION}"* ]]; then
            echo "Tag '${TAG}' does not contain build version '${BUILD_VERSION}'"; exit 1
          fi
          echo "Tag ${TAG} contains build version ${BUILD_VERSION}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JARs for all supported MID server releases
        run: |
          chmod u+x gradlew
          mkdir -p releases

          BUILD_NAME=$(grep 'archivesName' build.gradle.kts | sed -r 's/.*archivesName = "(.*)".*/\1/')
          BUILD_VERSION=$(grep '^version = ' build.gradle.kts | sed -r 's/^version = "(.*)"/\1/')

          for release in libs/*/; do
            release=$(basename "$release")
            echo "Building for MID server release: ${release}"
            # Xanadu and newer ship the FQCN-only variant; pre-Xanadu ships the legacy variant.
            case "${release}" in
              washingtondc|vancouver|utah) variant=legacy ;;
              *) variant=fqcn ;;
            esac
            ./gradlew jar -PmidRelease="${release}" -PresolverVariant="${variant}" --no-daemon
            cp "build/libs/${BUILD_NAME}-${BUILD_VERSION}.jar" "releases/${BUILD_NAME}-${release}-${BUILD_VERSION}.jar"
          done

          echo "Built JARs:"
          ls -lh releases/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tagname }}
        run: |
          BUILD_NAME=$(grep 'archivesName' build.gradle.kts | sed -r 's/.*archivesName = "(.*)".*/\1/')
          BUILD_VERSION=$(grep '^version = ' build.gradle.kts | sed -r 's/^version = "(.*)"/\1/')
          gh release create "${TAG}" releases/*.jar \
            --repo="${GITHUB_REPOSITORY}" \
            --title="${BUILD_NAME}-${BUILD_VERSION}" \
            --generate-notes
