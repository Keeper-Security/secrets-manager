name: Publish Oracle Storage to NPM
on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to NPM (uncheck to build only)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Get the source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Install package dependencies
        run: npm ci --omit=dev
        working-directory: ./sdk/javascript/packages/oracle

      - name: Install Syft
        run: |
          echo "Installing Syft v1.32.0..."
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /tmp/bin v1.32.0
          echo "/tmp/bin" >> "$GITHUB_PATH"

      - name: Install Manifest CLI
        run: |
          echo "Installing Manifest CLI v0.31.0..."
          curl -sSfL https://raw.githubusercontent.com/manifest-cyber/cli/main/install.sh | sh -s -- -b /tmp/bin v0.31.0

      - name: Create Syft configuration
        run: |
          cat > syft-config.yaml << 'EOF'
          select-catalogers:
            - "-github-action-workflow-usage-cataloger"
            - "-github-actions-usage-cataloger"
          EOF

      - name: Generate and upload SBOM
        env:
          MANIFEST_API_KEY: ${{ secrets.MANIFEST_TOKEN }}
        run: |
          JAVASCRIPT_SDK_DIR="./sdk/javascript"

          # Get version from package.json
          echo "Detecting Oracle Storage version..."
          if [ -f "${JAVASCRIPT_SDK_DIR}/packages/oracle/package.json" ]; then
            VERSION=$(grep -o '"version": "[^"]*"' "${JAVASCRIPT_SDK_DIR}/packages/oracle/package.json" | cut -d'"' -f4)
            echo "Detected version: ${VERSION}"
          else
            VERSION="1.0.0"
            echo "Could not detect version, using default: ${VERSION}"
          fi

          echo "Generating SBOM with Manifest CLI..."
          manifest sbom "${JAVASCRIPT_SDK_DIR}/packages/oracle" \
            --generator=syft \
            --name=keeper-secrets-manager-javascript-storage-oracle-kms \
            --version="${VERSION}" \
            --output=spdx-json \
            --file=oracle-storage-sbom.json \
            --api-key="${MANIFEST_API_KEY}" \
            --publish=true \
            --asset-label=application,sbom-generated,nodejs,oracle-storage \
            --generator-config=syft-config.yaml

          echo "SBOM generated and uploaded successfully: oracle-storage-sbom.json"
          echo "---------- SBOM Preview (first 20 lines) ----------"
          head -n 20 oracle-storage-sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-keeper-secrets-manager-javascript-storage-oracle-kms-${{ github.run_number }}
          path: oracle-storage-sbom.json
          retention-days: 10

  build-npm:
    needs: generate-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./sdk/javascript/packages/oracle

    steps:
      - name: Get the source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Upload NPM package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: npm-package-oracle-kms-${{ github.run_number }}
          path: |
            ${{ github.workspace }}/sdk/javascript/packages/oracle/dist/
            ${{ github.workspace }}/sdk/javascript/packages/oracle/package.json

  publish-npm:
    needs: build-npm
    if: ${{ github.event.inputs.publish == 'true' }}
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./sdk/javascript/packages/oracle

    steps:
      - name: Get the source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Retrieve secrets from KSM
        id: ksmsecrets
        uses: Keeper-Security/ksm-action@560d170bea253481a48eae617f0493aab7436c28 # master
        with:
          keeper-secret-config: ${{ secrets.KSM_NPM_PUBLISHER_NPM_SDK_CONFIG }}
          secrets: |
            2LmZq2z682qhTKYUizehow/field/password > env:NPM_TOKEN

      - name: Publish package
        run: npm publish --ignore-scripts
